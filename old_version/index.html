<!DOCTYPE html>
<html>

<head>
    <title>TGSPDCL Bill</title>

    <!-- ✅ Correct CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body {
            font-family: monospace;
            background: #eee;
        }

        .container {
            width: 420px;
            margin: auto;
            padding: 10px;
        }

        input,
        button,
        select {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
        }

        .bill {
            background: #fff;
            padding: 10px;
            border: 1px solid #000;
            font-size: 13px;
        }

        .center {
            text-align: center;
        }

        .line {
            border-top: 1px dashed #000;
            margin: 5px 0;
        }

        .heading {
            font-weight: bold;
            margin-top: 5px;
        }

        table {
            width: 100%;
            margin-top: 10px;
            font-size: 12px;
        }

        th,
        td {
            border: 1px solid #000;
            padding: 3px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">

        function App() {

            const [meterType, setMeterType] = React.useState("watchmen");
            const [prev, setPrev] = React.useState(0);
            const [curr, setCurr] = React.useState('');
            const [bill, setBill] = React.useState(null);

            // ✅ Load previous from LocalStorage DB
            React.useEffect(() => {

                const data = JSON.parse(localStorage.getItem("meterDB")) || [];

                const filtered = data.filter(d => d.meter === meterType);

                if (filtered.length > 0) {
                    setPrev(filtered[filtered.length - 1].curr);
                } else {
                    setPrev(0);
                }

                setBill(null);   // ✅ reset UI
                setCurr('');

            }, [meterType]);

            // ✅ TGSPDCL slab logic
            const calculateEnergy = (units) => {
                let energy = 0;
                let category = "";

                if (units <= 100) {
                    category = "LT Cat-I(A)";
                    energy = units <= 50
                        ? units * 1.95
                        : 50 * 1.95 + (units - 50) * 3.10;
                }
                else if (units <= 200) {
                    category = "LT Cat-I(B)(i)";
                    energy = units <= 100
                        ? units * 3.40
                        : 100 * 3.40 + (units - 100) * 4.80;
                }
                else {
                    category = "LT Cat-I(B)(ii)";
                    let remaining = units;

                    let slab1 = Math.min(remaining, 200);
                    energy += slab1 * 5.80;
                    remaining -= slab1;

                    if (remaining > 0) {
                        let slab2 = Math.min(remaining, 100);
                        energy += slab2 * 7.70;
                        remaining -= slab2;
                    }

                    if (remaining > 0) {
                        let slab3 = Math.min(remaining, 100);
                        energy += slab3 * 9.00;
                        remaining -= slab3;
                    }

                    if (remaining > 0) {
                        energy += remaining * 9.50;
                    }
                }

                return { energy, category };
            };

            const generateBill = () => {

                const prevVal = parseInt(prev) || 0;
                const currVal = parseInt(curr);

                if (!currVal && currVal !== 0) {
                    alert("Enter current reading");
                    return;
                }

                const units = currVal - prevVal;

                if (units < 0) {
                    alert("Invalid readings");
                    return;
                }

                const result = calculateEnergy(units);

                const fixed = 10.32;
                const customer = 36.13;
                const duty = result.energy * 0.024;

                const total = result.energy + fixed + customer + duty;

                const today = new Date().toISOString().split("T")[0];

                // ✅ STORE in LocalStorage DB
                let data = JSON.parse(localStorage.getItem("meterDB")) || [];

                data.push({
                    meter: meterType,
                    prev: prevVal,
                    curr: currVal,
                    units: units,
                    total: total.toFixed(2),
                    date: today
                });

                localStorage.setItem("meterDB", JSON.stringify(data));

                setBill({
                    units,
                    energy: result.energy,
                    category: result.category,
                    fixed,
                    customer,
                    duty,
                    total,
                    date: today
                });
            };

            const printBill = () => window.print();

            const downloadPDF = () => {
                const { jsPDF } = window.jspdf;

                html2canvas(document.getElementById("bill")).then(canvas => {
                    const img = canvas.toDataURL("image/png");
                    const pdf = new jsPDF();
                    pdf.addImage(img, 'PNG', 10, 10, 180, 0);
                    pdf.save("TGSPDCL_Bill.pdf");
                });
            };

            const history = (JSON.parse(localStorage.getItem("meterDB")) || [])
                .filter(d => d.meter === meterType);

            return (
                <div className="container">

                    <h3>Generate TGSPDCL Bill</h3>

                    <select value={meterType} onChange={(e) => setMeterType(e.target.value)}>
                        <option value="watchmen">Watchmen Room</option>
                        <option value="penthouse">Pent House</option>
                    </select>

                    <input value={prev} readOnly />

                    <input
                        type="number"
                        placeholder="Enter Current Reading"
                        value={curr}
                        onChange={(e) => setCurr(e.target.value)}
                    />

                    <button onClick={generateBill}>Generate Bill</button>

                    {bill && (
                        <>
                            <div id="bill" className="bill">

                                <div className="center">
                                    <b>TELANGANA TGSPDCL</b><br />
                                    LT ELECTRICITY BILL CUM NOTICE
                                </div>

                                <div className="line"></div>

                                <div className="heading">Bill Info</div>
                                Date: {bill.date}<br />
                                Section: GAJULARAMARAM<br />
                                Area: GAJULARAMARAM

                                <div className="line"></div>

                                <div className="heading">Consumer Details</div>
                                USC No: 115453839<br />
                                Name: MUSHAM RAJKUMAR<br />
                                Mobile: 8885868109<br />
                                Category: {bill.category}

                                <div className="line"></div>

                                <div className="heading">Meter Details</div>
                                Meter: {meterType}<br />
                                Previous: {prev}<br />
                                Current: {curr}<br />
                                Units: {bill.units}

                                <div className="line"></div>

                                <div className="heading">Charges</div>
                                Energy: ₹{bill.energy.toFixed(2)}<br />
                                Fixed: ₹{bill.fixed}<br />
                                Customer: ₹{bill.customer}<br />
                                Duty: ₹{bill.duty.toFixed(2)}

                                <div className="line"></div>

                                <div className="heading">Total Bill</div>
                                ₹{bill.total.toFixed(2)}

                            </div>

                            <button onClick={printBill}>Print</button>
                            <button onClick={downloadPDF}>Download PDF</button>
                        </>
                    )}

                    {/* ✅ History Table */}
                    <h4>History ({meterType})</h4>
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Prev</th>
                                <th>Curr</th>
                                <th>Units</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody>
                            {history.map((row, i) => (
                                <tr key={i}>
                                    <td>{row.date}</td>
                                    <td>{row.prev}</td>
                                    <td>{row.curr}</td>
                                    <td>{row.units}</td>
                                    <td>{row.total}</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>

                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);

    </script>

</body>

</html>
